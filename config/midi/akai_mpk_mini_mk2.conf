# default controller mapping for akai mpk mini mk2-style cc knobs
name=akai mpk mini mk2

# format: parameter=cc:channel:control:scale:min:max
attack=cc:1:1:linear:0.001:2.0
decay=cc:1:2:linear:0.001:2.0
sustain=cc:1:3:linear:0.0:1.0
release=cc:1:4:linear:0.001:3.0
filter_cutoff=cc:1:5:log:20.0:20000.0
filter_poles=cc:1:6:step:1:8
oscillator_morph=cc:1:7:linear:0.0:1.0
master_gain=cc:1:8:linear:0.0:1.0
second_oscillator_octave=cc:1:9:step:-1:1
second_oscillator_pitch=cc:1:10:step:-6:6
second_oscillator_fine_tune=cc:1:11:linear:-50.0:50.0
stereo_spread=cc:1:12:linear:0.0:1.0
first_oscillator_gain=cc:1:13:linear:0.0:1.0
second_oscillator_gain=cc:1:14:linear:0.0:1.0
second_oscillator_morph=cc:1:15:linear:0.0:1.0
master_gain=cc:1:16:linear:0.0:1.0
lfo_first_oscillator_gain_amount=cc:1:17:linear:0.0:1.0
lfo_second_oscillator_gain_amount=cc:1:18:linear:0.0:1.0
lfo_first_oscillator_morph_amount=cc:1:19:linear:0.0:1.0
lfo_second_oscillator_morph_amount=cc:1:20:linear:0.0:1.0
lfo_rate=cc:1:21:log:0.05:20.0
lfo_depth=cc:1:22:linear:0.0:1.0
lfo_filter_amount=cc:1:23:linear:0.0:1.0
lfo_shape_morph=cc:1:24:linear:0.0:1.0
distortion_mix=cc:1:25:linear:0.0:1.0
